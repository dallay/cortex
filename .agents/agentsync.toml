# -----------------------------------------------------------------------------
# Antigravity - High-performance AI coding CLI
# -----------------------------------------------------------------------------
# NOTE: Antigravity does not use a project-level AGENTS.md like Codex or Claude.
# It works primarily with skills (SKILL.md playbooks) in .agent/skills/.
# No instructions target is configured for Antigravity.
# -----------------------------------------------------------------------------
[agents.antigravity]
enabled = true
description = "Antigravity - High-performance AI coding CLI"

[agents.antigravity.targets.skills]
source = "skills"
destination = ".agent/skills"
type = "symlink-contents"
pattern = "*"

[agents.antigravity.targets.commands]
source = "command"
destination = ".agent/commands"
type = "symlink-contents"
pattern = "*"

# -----------------------------------------------------------------------------
# Root AGENTS.md
# -----------------------------------------------------------------------------
[agents.root]
enabled = true
description = "Root AGENTS.md for tools that look for it in repo root (e.g., Jules)"

[agents.root.targets.agents]
source = "AGENTS.md"
destination = "AGENTS.md"
type = "symlink"
