# sonar-project.properties for dallay/cortex (Rust + Vue.js Frontend)
# https://docs.sonarsource.com/sonarcloud/enrich/yaml-properties.html

sonar.projectKey=dallay_cortex
sonar.organization=dallay

# Rust sources
sonar.sources=apps/rook,crates/domain/rook-core,crates/domain/shared-kernel,crates/application/rook-usecases,crates/infrastructure/transport-axum,crates/infrastructure/providers-openai,crates/infrastructure/providers-anthropic,crates/infrastructure/providers-ollama,crates/infrastructure/providers-gemini,crates/infrastructure/providers-groq,crates/infrastructure/cache-memory,crates/infrastructure/audit-sqlite,crates/infrastructure/auth-sqlite,crates/infrastructure/provider-sqlite,crates/infrastructure/encryption-inmemory,crates/infrastructure/observability,crates/infrastructure/models-catalog,crates/infrastructure/db-migration,crates/infrastructure/sse-stream

# Vue.js / TypeScript frontend
sonar.sources+=apps/rook/dashboard/src

# Exclude generated and build artifacts, CI workflows
sonar.exclusions=**/target/**,**/*.lock,**/Cargo.lock,**/node_modules/**,**/dist/**,**/coverage/**,**/apps/rook/npm/rook/**,.github/**

# Coverage
sonar.coverage.jacoco.xmlReportsPaths=lcov.info

# Quality gates
sonar.sq.exclusions=**/target/**