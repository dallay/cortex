# sonar-project.properties for dallay/cortex (Rust)
# https://docs.sonarsource.com/sonarcloud/enrich/yaml-properties.html

sonar.projectKey=dallay_cortex
sonar.organization=dallay

# Rust
sonar.sources=apps/rook,crates/domain/rook-core,crates/application/rook-usecases,crates/infrastructure/transport-axum,crates/infrastructure/providers-openai,crates/infrastructure/providers-anthropic,crates/infrastructure/providers-ollama,crates/infrastructure/providers-gemini,crates/infrastructure/providers-groq,crates/infrastructure/cache-memory,crates/infrastructure/audit-sqlite,crates/infrastructure/auth-sqlite,crates/infrastructure/provider-sqlite,crates/infrastructure/encryption-inmemory,crates/infrastructure/observability,crates/shared-kernel/src

# Exclude generated and build artifacts
sonar.exclusions=**/target/**,**/*.lock,**/Cargo.lock

# Coverage
sonar.coverage.jacoco.xmlReportsPaths=lcov.info

# Quality gates
sonar.sq.exclusions=**/target/**