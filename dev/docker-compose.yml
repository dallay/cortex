services:
  rook-ubuntu:
    build:
      context: ..
      dockerfile: dev/Dockerfile.ubuntu
    image: rook:e2e-ubuntu
    container_name: rook-e2e-ubuntu
    ports:
      - "8081:8080"
    environment:
      - RUST_LOG=info
    volumes:
      - ./test-configs/rook-minimal.toml:/app/rook.toml:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - rook-test

  rook-alpine:
    build:
      context: ..
      dockerfile: dev/Dockerfile.alpine
    image: rook:e2e-alpine
    container_name: rook-e2e-alpine
    ports:
      - "8082:8080"
    environment:
      - RUST_LOG=info
    volumes:
      - ./test-configs/rook-minimal.toml:/app/rook.toml:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - rook-test

networks:
  rook-test:
    driver: bridge
