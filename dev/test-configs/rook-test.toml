[server]
host = "0.0.0.0"
port = 3773

[routing]
strategy = "priority"

[cache]
enabled = false
ttl_secs = 300

# File-based DB at /app/data/rook.db (tmpfs mount)
[database]
db_path = "/app/data/rook.db"

[audit]
db_path = ":memory:"

[provider_crud]
enabled = true

[auth.api_keys]
enabled = true
allow_env_fallback = true