  ## Architecture

  ### Authentication Tiers (existing)

    | Tier           | Auth Method                                  | Routes                          |
    |----------------|----------------------------------------------|----------------------------------|
    | `Public`       | None                                         | `GET /health`                   |
    | `ClientApi`    | `X-API-Key` header or `api_key` query param | `POST /v1/chat`, `GET /v1/models` |
    | `Management`   | Session cookie (`auth_token`) + CSRF        | Dashboard, `/api/providers`     |

  ### Existing API Key Domain (rook-core)

  From `crates/domain/rook-core/src/api_key.rs`:

    ```
    ApiKeyId       — SmolStr newtype
    ApiKeyScope    — SmolStr newtype, parse from &str (e.g. "read", "write")
    ApiKeyTier     — enum { Free, Pro, Enterprise }
    ApiKeySubject  — { id, label, scopes, tier }  (used at auth time)
    ApiKeyRecord   — { id, label, key_hash, key_prefix, scopes, tier, is_active, revoked_at, expires_at, created_at, last_used_at }
    ApiKeyRepositoryError — enum { NotFound, DuplicateHash, Database }
    ```

  ### Existing API Key Repository Port

  From `crates/domain/rook-core/src/ports.rs`:

    ```rust
  trait ApiKeyRepositoryPort: Send + Sync {
    async fn find_active_by_hash(&self, hash: &str) -> Result<Option<ApiKeySubject>, ApiKeyRepositoryError>;
    async fn record_last_used(&self, id: &ApiKeyId, used_at: DateTime<Utc>) -> Result<(), ApiKeyRepositoryError>;
    async fn list(&self) -> Result<Vec<ApiKeyRecord>, ApiKeyRepositoryError>;
    async fn find(&self, id: &ApiKeyId) -> Result<Option<ApiKeyRecord>, ApiKeyRepositoryError>;
    async fn create(&self, record: &ApiKeyRecord) -> Result<(), ApiKeyRepositoryError>;
    async fn update(&self, record: &ApiKeyRecord) -> Result<(), ApiKeyRepositoryError>;
    async fn delete(&self, id: &ApiKeyId) -> Result<(), ApiKeyRepositoryError>;
}
    ```

  ### Existing SqliteApiKeyRepository

  From `crates/infrastructure/auth-sqlite/src/lib.rs`:

    - Full `api_keys` table with all fields already defined
    - Indexes on `is_active`, `revoked_at`, `expires_at`
    - `run_migration()` creates table + indexes on first open
    - Existing: `find_active_by_hash`, `record_last_used`
    - **CRUD gap**: No `create`, `list`, `update`, `revoke` methods

  ### Rate Limiting

  From `crates/infrastructure/transport-axum/src/middleware/api_key_rate_limiter.rs`:

    | Tier        | Capacity | Refill rate       |
    |-------------|----------|-------------------|
    | `Free`      | 100      | 10 tokens/sec     |
    | `Pro`       | 1,000    | 100 tokens/sec    |
    | `Enterprise`| 10,000   | 1,000 tokens/sec  |

    Rate limiting is **wired but not actively enforced** (Known Gap per ARCHITECTURE.md).

