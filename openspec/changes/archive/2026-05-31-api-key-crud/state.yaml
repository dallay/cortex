    ### Coverage

    - Happy paths: ✅ Covered (create, list, get, update, revoke all documented)
    - Edge cases: ✅ Covered (duplicate hash, idempotent revoke, past expiration, non-existent key)
    - Error states: ✅ Covered (validation errors, 404, 409, 500)

    ## What Exists vs. What's Needed

    ### Exists (Foundation)

    - ✅ `ApiKeyId`, `ApiKeyScope`, `ApiKeyTier`, `ApiKeySubject`, `ApiKeyRecord` domain types
    - ✅ `ApiKeyRepositoryPort` trait (full CRUD already in ports.rs)
    - ✅ `SqliteApiKeyRepository` with full schema migration
    - ✅ `ManageApiKeys` use case with `create`, `list`, `get`, `update`, `delete` methods
    - ✅ HMAC-SHA256 key hashing via `ring::hmac`
    - ✅ Key generation via `rand::RngCore` + base64url encoding with `rk-` prefix
    - ✅ Auth middleware (`Authorization: Bearer` and `X-API-Key`) using `find_active_by_hash`
    - ✅ Per-key rate limiting wired in transport
    - ✅ `ManageApiKeys` already instantiated in DI with repo + `API_KEY_HASH_SECRET`
    - ✅ All SQLite migrations for `api_keys` table already defined
    - ✅ Transport handlers for CRUD already exist (delete is hard delete, needs change to revoke)
    - ✅ Dashboard `ApiKeysView.vue` exists (mock data, needs real API integration)

    ### Gaps (Full CRUD)

    - ⬜ `revoke()` method in `ApiKeyRepositoryPort` — new method needed
    - ⬜ `revoke()` implementation in `SqliteApiKeyRepository` — soft update SQL
    - ⬜ `ManageApiKeys::revoke()` — new method, calls repo.revoke()
    - ⬜ `ManageApiKeys::delete()` change to call `revoke()` instead of hard delete
    - ⬜ Pagination on `list()` — add `limit`/`offset`, return `(Vec, total)`
    - ⬜ Transport `revoke_api_key` handler — `DELETE` calls `revoke()` not `delete()`
    - ⬜ Dashboard API integration — connect Vue to real API endpoints
    - ⬜ Create modal with scopes, tier, expiration fields
    - ⬜ Edit modal for updating key metadata
    - ⬜ Raw key display banner after create
    - ⬜ Pagination controls in dashboard

    ## Conventions Applied

    - **Newtype pattern**: `ApiKeyId(SmolStr)`, no raw `String` for domain IDs
    - **Error enum per domain**: `ApiKeyRepositoryError` already exists
    - **Async trait**: `#[async_trait]` for all port traits
    - **Clean Architecture**: Domain types in `rook-core`, ports in `rook-core/src/ports.rs`, impl in `auth-sqlite`
    - **Migration on open**: `run_migration()` called from `new()`, no separate migration binary
    - **No inline `#[cfg(test)]` modules** in this crate — tests are separate test targets
    - **Cryptographic storage**: Key hashes stored (never raw), `key_prefix` for display
    - **UUID v4** for `ApiKeyId` generation
    - **Soft revocation**: `is_active = false`, `revoked_at = now()`, key_hash preserved

