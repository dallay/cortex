# SDD Configuration — cortex
# Generated by sdd-init

project:
  name: cortex
  type: rust-workspace
  language: rust
  edition: "2021"
  rust_version: "1.81"

# Workspace root Cargo.toml at project root
root_cargo: Cargo.toml

# Workspace members (packages/crates)
packages:
  - path: crates/domain/shared-kernel
    type: lib
    purpose: Common types with zero external dependencies (ProviderId, ModelId, RequestId, NuxaError)
  - path: crates/domain/rook-core
    type: lib
    purpose: Domain model and port traits (CompletionRequest/Response, ProviderPort, RouterPort, CachePort, AuditPort)
  - path: crates/application/rook-usecases
    type: lib
    purpose: Application orchestration (RouteRequest, FallbackRouter, ManageProviders, HealthCheck)
  - path: crates/infrastructure/transport-axum
    type: lib
    purpose: HTTP transport layer (axum router, OpenAI/Anthropic adapters)
  - path: crates/infrastructure/cache-memory
    type: lib
    purpose: In-memory cache (DashMap TTL cache, implements CachePort)
  - path: crates/infrastructure/audit-sqlite
    type: lib
    purpose: SQLite-backed audit log (implements AuditPort)
  - path: crates/infrastructure/encryption-inmemory
    type: lib
    purpose: AES-256-GCM credential encryption and Argon2id key derivation (implements KeyManager)
  - path: crates/infrastructure/provider-sqlite
    type: lib
    purpose: SQLite-backed provider connection repository (implements ProviderRepositoryPort)
  - path: crates/infrastructure/observability
    type: lib
    purpose: Tracing, metrics, OpenTelemetry integration
  - path: crates/infrastructure/providers-openai
    type: lib
  - path: crates/infrastructure/providers-anthropic
    type: lib
  - path: crates/infrastructure/providers-ollama
    type: lib
  - path: crates/infrastructure/providers-gemini
    type: lib
  - path: crates/infrastructure/providers-groq
    type: lib
  - path: apps/rook
    type: bin
    purpose: Main binary — main.rs, config.rs, di.rs, server.rs

# Tooling
tooling:
  fmt: rustfmt
  linter: clippy
  security_audit: cargo-audit
  test_runner: cargo test
  coverage: cargo llvm-cov
  spellcheck: cargo-spellcheck
  task_runner: just
  git_hooks: lefthook

# Quality gates (from CI)
quality:
  fmt_check: "cargo fmt --all -- --check"
  clippy_check: "cargo clippy --workspace --all-targets -- -D warnings"
  test_check: "cargo test --workspace --all-features"
  doc_check: "cargo doc --workspace --no-deps --document-private-items"
  audit_check: "cargo audit"

# Architecture pattern: Clean Architecture / Hexagonal
# Layer order (outermost → innermost):
#   apps/rook (binary, DI bootstrap)
#   → transport-axum (infrastructure, HTTP)
#   → rook-usecases (application)
#   → rook-core (domain)
#   → shared-kernel (no deps)

# Observability stack
observability:
  logging: tracing + tracing-subscriber (JSON to stdout, env-filter)
  metrics:
    metrics crate (labels: provider, model, status)
  tracing: opentelemetry

# No test directory pattern found — tests live inline with lib targets
testing:
  strict_tdd: false
  reason: "No inline #[cfg(test)] modules found in workspace scan; tests are cargo test targets only"
  test_command: "cargo test --workspace --all-features"
  coverage_command: "cargo llvm-cov --workspace --html"

# Persistence mode for SDD artifacts
artifact_store:
  mode: openspec
  path: openspec/

# Next step: sdd-explore
next_phase: sdd-explore
