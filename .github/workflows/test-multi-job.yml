name: Test Multi-Job

on:
  push:
    branches: [main, test/*]

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - run: echo "fmt"
  check:
    runs-on: ubuntu-latest
    steps:
      - run: echo "check"
  test:
    runs-on: ubuntu-latest
    steps:
      - run: echo "test"
  clippy:
    runs-on: ubuntu-latest
    steps:
      - run: echo "clippy"
  doc:
    runs-on: ubuntu-latest
    steps:
      - run: echo "doc"
  audit:
    runs-on: ubuntu-latest
    steps:
      - run: echo "audit"
  build:
    runs-on: ubuntu-latest
    steps:
      - run: echo "build"
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - run: echo "test-frontend"
  coverage:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - run: echo "coverage"
  build-targets:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu]
    steps:
      - run: echo "build ${{ matrix.target }}"
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        target: [x86_64-pc-windows-msvc, aarch64-pc-windows-msvc]
    steps:
      - run: echo "build ${{ matrix.target }}"
  build-darwin:
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64-apple-darwin, aarch64-apple-darwin]
    steps:
      - run: echo "build ${{ matrix.target }}"
  test-multi:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - run: echo "test on ${{ matrix.os }}"
  security:
    runs-on: ubuntu-latest
    steps:
      - run: echo "security"
  semgrep:
    runs-on: ubuntu-latest
    steps:
      - run: echo "semgrep"
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - run: echo "gitleaks"
  trivy:
    runs-on: ubuntu-latest
    steps:
      - run: echo "trivy"
  sonar:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - run: echo "sonar"
