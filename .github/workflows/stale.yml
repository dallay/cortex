name: 🕐 Stale Monitor

on:
  schedule:
    # Run daily at 09:00 UTC
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      days-before-stale:
        description: 'Days before marking as stale'
        type: number
        required: false
        default: 120
      days-before-close:
        description: 'Days after stale before closing'
        type: number
        required: false
        default: 60

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: 🕐 Close Stale Items
    uses: dallay/common-actions/.github/workflows/stale.yml@v2.2.0
    with:
      days-before-stale: ${{ inputs.days-before-stale || 120 }}
      days-before-close: ${{ inputs.days-before-close || 60 }}
    secrets: inherit